appId: com.localfootyathlete.app
name: Run one registered Explorer scenario
---
- runFlow:
    file: launch-explorer-app.yaml
    env:
      EXPLORER_LAUNCH_PURPOSE: scenario-reset
- openLink: "localfootyathlete://e2e/explorer/run/${SCENARIO_ID}?campaignId=${EXPLORER_CAMPAIGN_ID}&integratedRepositorySha=${INTEGRATED_REPOSITORY_SHA}&deterministicClockFingerprint=${EXPLORER_CAMPAIGN_CLOCK_FINGERPRINT}&e2eMetroUrl=${E2E_METRO_URL}"
- extendedWaitUntil:
    visible:
      id: "e2e-scenario-complete-${SCENARIO_ID}"
    timeout: "${SCENARIO_BUDGET_MS}"
