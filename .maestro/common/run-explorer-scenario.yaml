appId: com.localfootyathlete.app
name: Run one registered Explorer scenario
---
- runFlow:
    file: launch-explorer-app.yaml
    env:
      EXPLORER_LAUNCH_PURPOSE: scenario-reset
      EXPLORER_CLEAR_STATE: "true"
      EXPLORER_LAUNCH_DEEP_LINK: "localfootyathlete://e2e/explorer/diagnostics/scenario-reset?e2eMetroUrl=${E2E_METRO_URL}"
- openLink: "localfootyathlete://e2e/explorer/run/${SCENARIO_ID}?e2eMetroUrl=${E2E_METRO_URL}"
- extendedWaitUntil:
    visible:
      id: "e2e-scenario-complete-${SCENARIO_ID}"
    timeout: "${SCENARIO_BUDGET_MS}"
