appId: com.localfootyathlete.app
name: Final scenario checkpoint and completion reload
---
- openLink: "localfootyathlete://e2e/scenario/checkpoint/${SCENARIO_ID}/${CHECKPOINT_STEP_ID}"
- extendedWaitUntil:
    visible:
      id: "e2e-checkpoint-ready-${SCENARIO_ID}-${CHECKPOINT_STEP_ID}"
    timeout: 15000
- runFlow:
    file: launch-explorer-app.yaml
    env:
      EXPLORER_LAUNCH_PURPOSE: final-step-reload
      EXPLORER_CLEAR_STATE: "false"
      EXPLORER_LAUNCH_DEEP_LINK: "localfootyathlete://e2e/explorer/diagnostics/final-step-reload?e2eMetroUrl=${E2E_METRO_URL}"
- extendedWaitUntil:
    visible:
      id: "e2e-reload-ready-${SCENARIO_ID}-${CHECKPOINT_STEP_ID}-${RELOAD_COUNT}"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "e2e-scenario-complete-${SCENARIO_ID}"
    timeout: 15000
- assertNotVisible:
    id: "e2e-seed-loading"
- assertNotVisible:
    id: "e2e-seed-error"
