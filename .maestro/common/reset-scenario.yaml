appId: com.localfootyathlete.app
name: Deterministic dev E2E scenario reset
---
- runFlow:
    file: launch-explorer-app.yaml
    env:
      EXPLORER_LAUNCH_PURPOSE: scenario-reset
      EXPLORER_LAUNCH_DEEP_LINK: "localfootyathlete://e2e/explorer/diagnostics/scenario-reset?e2eMetroUrl=${E2E_METRO_URL}"
- openLink: "localfootyathlete://e2e/scenario/reset/${SCENARIO_ID}"
- extendedWaitUntil:
    visible:
      id: "e2e-scenario-ready-${SCENARIO_ID}"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "e2e-next-action-eligible-${SCENARIO_ID}-${NEXT_STEP_ID}"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "e2e-explorer-next-action-eligible-${SCENARIO_ID}-${NEXT_STEP_ID}"
    timeout: 15000
- assertNotVisible:
    id: "e2e-seed-error"
