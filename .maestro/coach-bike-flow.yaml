appId: com.localfootyathlete.app
name: Coach bike-flow regression smoke
tags:
  - smoke
  - coach
  - regression
---
# ──────────────────────────────────────────────────────────────────────
# coach-bike-flow.yaml
#
# End-to-end smoke for Phase H. Drives the actual iOS simulator through
# the exact sequence that caused the Assault/Rower regression:
#
#   1. Launch the app with cleared state.
#   2. Open the smoke-bootstrap deep link. The bootstrap (in
#      src/utils/smokeBootstrap.ts, wired through useInitializeApp)
#      seeds Sam's full persona deterministically + installs the
#      DEFAULT_PROGRAM + marks onboarding complete — all without any
#      UI tapping. This replaces the brittle dev-skip Pressable tap;
#      onboarding is no longer in the smoke's critical path.
#   3. Wait for the state-machine markers to converge on Coach (see
#      below).
#   4. Start on the Coach route and send three messages:
#        - "Why is there a mid week row?"
#        - "Can you change to a bike?"
#        - "You changed to an assault bike I wanted a normal bike"
#   5. Use smoke-only navigation controls to open Program (Home).
#   6. Use smoke-only navigation controls to open Wednesday's session.
#   7. Screenshot + assert visible workout text contains "Bike", "20min",
#      and DOES NOT contain Rower / Row / Assault / [Swapped to bike].
#
# State-machine markers (src/navigation/smokeNavState.ts):
#   smoke-runtime-ready          → App.tsx evaluated.
#   smoke-bootstrap-complete     → runSmokeBootstrap finished.
#   smoke-nav-ready              → NavigationContainer.onReady fired.
#   smoke-route-current-Coach    → onStateChange + getCurrentLeafRouteName
#                                  resolved actual leaf to Coach.
#   smoke-bootstrap-route-ready  → routeIntent === 'Coach' AND
#                                  actualCurrentRoute === 'Coach'.
#   smoke-route-mismatch         → enforcer fired but actual route !=
#                                  intent (we ASSERT NOT VISIBLE).
#   coach-ready                  → CoachScreen focused.
#
# Required testIDs (post-bootstrap, in CoachScreen + DayWorkoutScreenV2):
#   coach-input, coach-send-button, coach-message-list (CoachScreen)
#   smoke-wednesday-workout-ready, smoke-open-wednesday-workout,
#   smoke-wednesday-workout-missing (CoachScreen — dev-only smoke controls
#   that resolve Wednesday from useResolvedWeek and dispatch directly to
#   the real DayWorkoutScreen)
#   day-workout-title, day-workout-description (DayWorkoutScreenV2)
#
# main-tabs-root is intentionally NOT a smoke readiness gate. It exists
# as a structural marker for non-smoke flows.
#
# Run on a Mac with the iOS simulator booted:
#   npm run smoke:coach-bike-flow
# ──────────────────────────────────────────────────────────────────────

# Fresh state → no leftover Zustand from a previous run.
- launchApp:
    clearState: true
    stopApp: true

# ── Smoke bootstrap (deep link, no onboarding UI) ────────────────────
# The bootstrap handler is the canonical entry point for the harness.
# When the URL is received:
#   - calendarStore.clearAllGames() + profileStore.clear()
#   - profileStore.updateOnboardingData(DEV_TEST_ONBOARDING_DATA)
#   - seedOnboardingProgram(DEFAULT_PROGRAM)        (deterministic)
#   - profileStore.completeOnboarding()             (flips the gate)
#   - setRouteIntent('Coach') + setBootstrapComplete(true) on the
#     smoke state machine.
- openLink: "localfootyathlete://smoke/coach-bike-flow"

# 1. Runtime alive (App.tsx evaluated module body, setRuntimeReady fired).
- extendedWaitUntil:
    visible:
      id: "smoke-runtime-ready"
    timeout: 30000

# 2. Bootstrap (profile + program + onboarding complete) finished AND the
#    state machine recorded bootstrapComplete = true.
- extendedWaitUntil:
    visible:
      id: "smoke-bootstrap-complete"
    timeout: 30000

# 3. NavigationContainer.onReady has fired → setNavReady(true).
- extendedWaitUntil:
    visible:
      id: "smoke-nav-ready"
    timeout: 15000

# 4. NavigationContainer.onStateChange resolved the active leaf route to
#    'Coach' (single source of truth for actualCurrentRoute).
- extendedWaitUntil:
    visible:
      id: "smoke-route-current-Coach"
    timeout: 15000

# 5. Composite — intent AND actual leaf route both resolve to Coach.
- extendedWaitUntil:
    visible:
      id: "smoke-bootstrap-route-ready"
    timeout: 5000

# 6. Sanity — the harness must NOT be in mismatch state.
- assertNotVisible:
    id: "smoke-route-mismatch"

# 7. CoachScreen is focused and interactive.
- extendedWaitUntil:
    visible:
      id: "coach-ready"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "coach-input"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "coach-send-button"
    timeout: 5000

# 8. Hard preflight state machine. Three separate mount probes precede
# the four-state visible-week machine; each probe maps to a precise
# wrapper diagnostic label so a "no marker visible" failure cannot be
# silent:
#
#   1. assertVisible smoke-build-fingerprint
#      App.tsx-owned 30×30 lime square. Survives any failure in the
#      imported harness module / navigators / Zustand. If missing →
#      "Stale bundle / App.tsx marker not mounted."
#   2. assertVisible smoke-harness-mounted
#      Rendered by SmokeCoachBikeHarness itself BEFORE the state
#      machine runs. If missing while fingerprint is visible →
#      "Harness not mounted" (App.tsx OK; harness module load/render
#      broke).
#   3. assertVisible smoke-visible-week-debug
#      Carries state+reason+route+week in accessibilityLabel.
#      If missing while harness-mounted is visible →
#      "Harness mounted but debug marker missing" (state derivation
#      threw or marker render hit a layout problem).
#   4. assertNotVisible smoke-visible-week-inactive  → Harness inactive
#   5. extendedWaitUntil  smoke-precoach-week-ready  → 15s, tolerates pending
#   6. assertNotVisible smoke-visible-week-pending   → Harness pending
#   7. assertNotVisible smoke-visible-week-missing   → Harness missing
- assertVisible:
    id: "smoke-build-fingerprint"
- assertVisible:
    id: "smoke-harness-mounted"
- assertVisible:
    id: "smoke-visible-week-debug"
- assertNotVisible:
    id: "smoke-visible-week-inactive"
- extendedWaitUntil:
    visible:
      id: "smoke-precoach-week-ready"
    timeout: 15000
- assertNotVisible:
    id: "smoke-visible-week-pending"
- assertNotVisible:
    id: "smoke-visible-week-missing"

# ── Turn 1: "Why is there a mid week row?" ───────────────────────────
- tapOn:
    id: "coach-input"
- inputText: "Why is there a mid week row?"
- tapOn:
    id: "coach-send-button"
- waitForAnimationToEnd:
    timeout: 12000
- assertVisible:
    id: "coach-message-list"

# Negative contract — the latest assistant reply must NOT contain any
# of the forbidden "Which session…?" / "I can't see…" clarifier strings.
# Rendered by CoachScreen's FORBIDDEN_CLARIFIER_RE detector.
- assertNotVisible:
    id: "smoke-coach-unexpected-clarifier"

# ── Turn 2: "Can you change to a bike?" ──────────────────────────────
- tapOn:
    id: "coach-input"
- inputText: "Can you change to a bike?"
- tapOn:
    id: "coach-send-button"
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible:
    id: "coach-message-list"

# This is THE turn where target binding has historically leaked into a
# clarifier. If "Which session should I switch?" / "Which session should
# the bike change apply to?" / similar emit, smoke-coach-unexpected-
# clarifier renders and this assertion fails fast.
- assertNotVisible:
    id: "smoke-coach-unexpected-clarifier"

# ── Turn 3: "You changed to an assault bike I wanted a normal bike" ──
- tapOn:
    id: "coach-input"
- inputText: "You changed to an assault bike I wanted a normal bike"
- tapOn:
    id: "coach-send-button"
- waitForAnimationToEnd:
    timeout: 15000
- assertVisible:
    id: "coach-message-list"

- assertNotVisible:
    id: "smoke-coach-unexpected-clarifier"

# ── Smoke-only direct Coach → DayWorkout navigation ─────────────────
#
# This smoke is fundamentally a contract test on the VISIBLE DayWorkout
# text after the three-message coach mutation. It is NOT a Program
# navigation smoke. Routing through Program/Home and tapping a second
# smoke control there added brittleness without coverage — every
# failure mode in the second hop was orthogonal to what we assert.
#
# CoachScreen now reads the resolved week (same source of truth
# HomeScreen uses — useResolvedWeek → buildProgramTabProjectedWeek →
# projectVisibleDay), finds the Wednesday entry, and dispatches
# directly to the real DayWorkoutScreen via the root navigationRef:
#
#   navigationRef.dispatch(CommonActions.navigate('ProgramTab', {
#     screen: 'DayWorkout',
#     params: { workoutId, date },
#   }))
#
# Markers rendered by CoachScreen:
#   smoke-wednesday-workout-ready    — stable Wednesday Easy Aerobic Flush
#                                      target resolved (Rower not required).
#   smoke-open-wednesday-workout     — tappable Pressable (only when
#                                      ready). Direct DayWorkout nav.
#   smoke-wednesday-workout-missing  — fallback negative marker. Logs
#                                      [smoke-open-wednesday-workout]
#                                      missing reason=<reason> where
#                                      reason ∈ { no-visible-week-data,
#                                      no-Wednesday-date-in-week,
#                                      Wednesday-day-has-no-workout,
#                                      DayWorkout-route-params-unavailable
#                                      }.
#
# Negative contract first — its presence means CoachScreen couldn't
# resolve Wednesday's workout.
- assertNotVisible:
    id: "smoke-wednesday-workout-missing"
- extendedWaitUntil:
    visible:
      id: "smoke-wednesday-workout-ready"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "smoke-open-wednesday-workout"
    timeout: 10000
- tapOn:
    id: "smoke-open-wednesday-workout"
- waitForAnimationToEnd:
    timeout: 5000

# ── Visible DayWorkout assertions ────────────────────────────────────
- assertVisible:
    id: "day-workout-title"

# DayWorkout final contract markers — rendered inline with
# day-workout-title in DayWorkoutScreenV2. THREE assertions in this
# exact order so each failure surfaces a distinct wrapper label:
#   1. smoke-dayworkout-contract-mounted  → "DayWorkout mounted but
#      contract marker mount point missing." (mount probe — proves
#      the render path reached the marker JSX).
#   2. smoke-dayworkout-contract-ready    → "DayWorkout final contract
#      failed: <label>" (contract evaluation — Easy Aerobic Flush /
#      Bike / 20min / easy intensity, no Rower / Assault / Swapped).
#   3. smoke-dayworkout-contract-failed   → "DayWorkout contract
#      marker rendered silently." (assertNotVisible — must be absent
#      when ready was visible).
- assertVisible:
    id: "smoke-dayworkout-contract-mounted"
- assertVisible:
    id: "smoke-dayworkout-contract-ready"
- assertNotVisible:
    id: "smoke-dayworkout-contract-failed"

# ── Screenshot for artifact archive ──────────────────────────────────
- takeScreenshot: artifacts/coach-bike-flow-wed.png
